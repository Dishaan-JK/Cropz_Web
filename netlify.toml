[build]
  command = "./scripts/netlify_build.sh"
  publish = "frontend/build/web"
  functions = "netlify/functions"

[build.environment]
  FLUTTER_VERSION = "3.41.9"
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/cards/*"
  to = "/.netlify/functions/cards/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
